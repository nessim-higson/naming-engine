<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
<title>Z-Space — Naming Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0..1,300..500&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--fd:"Fraunces",Georgia,serif;--fu:"Inter",system-ui,sans-serif;--fm:"Space Mono",monospace;
  --ink:#F4F1EA;--soft:#8a867d;--line:#ffffff1c;--ease:cubic-bezier(.22,.61,.36,1)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#060608;overscroll-behavior:none}
body{font-family:var(--fu);color:var(--ink);-webkit-font-smoothing:antialiased;touch-action:manipulation}
canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0}
.vig{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(135% 130% at 50% 46%,transparent 30%,#03030599 78%,#030305 100%)}
.bar{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;justify-content:space-between;align-items:center;padding:env(safe-area-inset-top,16px) 22px 0;height:62px;pointer-events:none}
.brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:13.5px;letter-spacing:.02em;text-shadow:0 1px 20px #000a}
.brand .mk{width:17px;height:17px;border:1.5px solid var(--ink);border-radius:50%;position:relative}
.brand .mk::after{content:"";position:absolute;inset:4px;border-radius:50%;background:var(--ink)}
.brand small{color:var(--soft);font-weight:400}
.tip{font-size:11.5px;color:var(--soft);text-shadow:0 1px 16px #000;text-align:right;max-width:46%}

.lead{position:fixed;z-index:3;left:50%;top:24%;transform:translateX(-50%);text-align:center;width:92%;pointer-events:none;transition:opacity .6s,transform .6s}
.lead.hide{opacity:0;transform:translateX(-50%) translateY(-12px)}
.lead h1{font-family:var(--fd);font-weight:340;font-size:clamp(26px,5.2vw,42px);letter-spacing:-.02em}
.lead h1 em{font-style:italic}
.lead p{color:var(--soft);font-size:14px;margin-top:9px}

/* depth nav rail */
.nav{position:fixed;z-index:6;right:26px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:2px;pointer-events:auto}
.nav .st{display:flex;align-items:center;gap:11px;justify-content:flex-end;cursor:pointer;padding:7px 0;opacity:.5;transition:.25s var(--ease)}
.nav .st[data-lock="1"]{opacity:.2;pointer-events:none;cursor:default}
.nav .st.cur,.nav .st:hover{opacity:1}
.nav .st .lb{font-family:var(--fm);font-size:11px;letter-spacing:.08em;text-transform:uppercase;text-shadow:0 1px 12px #000}
.nav .st .dot{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--ink);position:relative;flex:none}
.nav .st.cur .dot::after{content:"";position:absolute;inset:2px;border-radius:50%;background:var(--ink)}
.nav .depth{position:absolute;right:4px;top:14px;bottom:14px;width:1px;background:linear-gradient(#ffffff00,#ffffff22,#ffffff00);z-index:-1}

.island{position:fixed;z-index:6;left:50%;bottom:calc(34px + env(safe-area-inset-bottom,0px));transform:translateX(-50%);
  width:min(620px,90vw);background:#0a0a0cd9;backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);
  border:1px solid var(--line);border-radius:999px;padding:6px 6px 6px 20px;display:flex;align-items:center;gap:10px;box-shadow:0 24px 70px -30px #000e;transition:.3s}
.island:focus-within{border-color:#ffffff44}
.island .pre{font-family:var(--fm);font-size:11px;color:var(--soft);white-space:nowrap}
#in{flex:1;min-width:0;background:transparent;border:0;outline:0;color:var(--ink);font-family:var(--fu);font-size:15px;padding:11px 0}
#in::placeholder{color:#ffffff34}
.act{font-family:var(--fu);font-weight:600;font-size:13px;padding:11px 18px;border-radius:999px;border:0;cursor:pointer;background:var(--ink);color:#0a0a0a;white-space:nowrap;transition:.2s var(--ease)}
.act:hover{transform:translateY(-1px)}.act[disabled]{opacity:.3;cursor:not-allowed;transform:none}
.exline{position:fixed;z-index:6;left:50%;bottom:calc(9px + env(safe-area-inset-bottom,0px));transform:translateX(-50%);font-size:11px;color:var(--soft)}
.exline button{background:none;border:0;color:var(--ink);cursor:pointer;text-decoration:underline;text-underline-offset:3px;font:inherit}

.scrim{position:fixed;inset:0;z-index:9;background:#000000a8;backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:.35s}
.scrim.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;z-index:10;background:#0e0e10f2;backdrop-filter:blur(26px) saturate(1.2);-webkit-backdrop-filter:blur(26px) saturate(1.2);border:1px solid var(--line);box-shadow:0 40px 100px -30px #000;transition:transform .42s var(--ease),opacity .42s var(--ease)}
.sheet{right:26px;top:50%;width:380px;max-height:86vh;overflow:auto;border-radius:22px;padding:26px;transform:translateY(-50%) translateX(30px);opacity:0;pointer-events:none}
.sheet.on{transform:translateY(-50%) translateX(0);opacity:1;pointer-events:auto}
.sheet::-webkit-scrollbar{width:0}
.sheet .lens{display:inline-flex;align-items:center;gap:7px;font-family:var(--fm);font-size:11px;letter-spacing:.04em;color:var(--soft);border:1px solid var(--line);border-radius:999px;padding:5px 11px;margin-bottom:16px}
.sheet .lens .sw{width:8px;height:8px;border-radius:50%}
.sheet h2{font-family:var(--fd);font-weight:380;font-size:38px;letter-spacing:-.02em;line-height:1;margin-bottom:6px}
.sheet .story{font-family:var(--fd);font-style:italic;font-weight:330;font-size:16px;line-height:1.5;margin-bottom:20px}
.scorehead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
.scorehead .n{font-family:var(--fm);font-size:30px;font-weight:700}.scorehead .n small{font-size:14px;color:var(--soft)}
.scorehead .tier{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft)}
.crit{display:flex;align-items:center;gap:11px;margin-bottom:9px}
.crit .nm{font-size:12.5px;width:118px;flex:none;color:var(--soft)}
.crit .tk{flex:1;height:5px;background:#ffffff16;border-radius:9px;overflow:hidden}
.crit .fl{height:100%;border-radius:9px}.crit .v{font-family:var(--fm);font-size:11px;width:20px;text-align:right;color:var(--soft)}
.cf{margin-top:18px;font-size:13px;line-height:1.55}.cf b{color:var(--soft);font-weight:600;font-size:11px;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:4px}
.conn{margin-top:20px;border-top:1px solid var(--line);padding-top:16px}.conn .h{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);margin-bottom:10px}
.conn .row{display:flex;gap:7px;flex-wrap:wrap}.conn .c{font-size:12.5px;border:1px solid var(--line);border-radius:999px;padding:6px 12px;cursor:pointer;background:#ffffff06}.conn .c:hover{border-color:#ffffff44}
.sheet .x{position:absolute;top:18px;right:18px;width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:#ffffff08;color:var(--ink);cursor:pointer;font-size:15px}

@media(max-width:760px){
  .tip{display:none}.lead{top:18%}
  .nav{right:auto;left:50%;top:auto;bottom:calc(86px + env(safe-area-inset-bottom,0px));transform:translateX(-50%);flex-direction:row;gap:14px}
  .nav .st{flex-direction:column-reverse;gap:6px}.nav .st .lb{font-size:9px}.nav .depth{display:none}
  .sheet{right:0;left:0;top:auto;bottom:0;width:100%;max-height:82vh;border-radius:24px 24px 0 0;padding:22px 22px calc(26px + env(safe-area-inset-bottom,0px));transform:translateY(100%)}
  .sheet.on{transform:translateY(0)}.sheet h2{font-size:34px}
  .island{width:94vw;bottom:calc(14px + env(safe-area-inset-bottom,0px))}.exline{display:none}
}
</style>
</head>
<body>
<canvas id="field"></canvas>
<div class="vig"></div>
<div class="bar"><div class="brand"><span class="mk"></span> Naming Engine <small>· z-space</small></div><div class="tip" id="tip">type your idea — then travel through it</div></div>
<div class="lead" id="lead"><h1>Tell me what you're <em>building.</em></h1><p>Your idea becomes a space. Fly through it to the name.</p></div>

<nav class="nav" id="nav"><div class="depth"></div></nav>

<div class="island" id="island"><span class="pre">▸ idea</span>
  <input id="in" placeholder="a drink for people who quit alcohol but miss the ritual…" autocomplete="off" autocapitalize="off" />
  <button class="act" id="act" disabled>Resolve →</button></div>
<div class="exline"><button id="ex">try an example</button></div>

<div class="scrim" id="scrim"></div>
<aside class="sheet" id="sheet"></aside>

<script>
const cv=document.getElementById('field'),ctx=cv.getContext('2d');
let W,H,DPR,FOCAL;
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;FOCAL=0.92*H;}
addEventListener('resize',resize);resize();
const isMobile=()=>innerWidth<=760;
const hexRgb=h=>{const n=parseInt(h.slice(1),16);return[n>>16&255,n>>8&255,n&255];};

const STOP=new Set('the a an of for but who and to in it is we our that with you your are on as be by or so im were re make making build building this they them at not about into like just still little'.split(' '));
const FEELKW={Relief:['calm','rest','stress','relief','ease','quiet','peace','soothe'],Momentum:['fast','speed','scale','grow','accelerate','momentum','ship','launch','move'],'High-Status':['premium','luxury','crafted','elegant','refined','ceremonial','proper','sophisticated'],Wonder:['magic','wonder','discover','curious','awe','imagine','dream','explore','delight'],Rebellion:['rebel','against','disrupt','bold','break','anti','defiant','opposite'],Belonging:['belong','community','together','tribe','people','human','connect','ritual','miss','bar','share'],Control:['control','secure','precise','master','reliable','trust','data','power']};
const FEELCOL={Relief:'#A8E0D8',Momentum:'#3DE0FF','High-Status':'#C9A24C',Wonder:'#9B6CF2',Rebellion:'#C6F24E',Belonging:'#E8A24C',Control:'#9FB2C6'};
const LENSES_FOR={Belonging:['Identity','Linguistic','Metaphor','Place'],Wonder:['Mythology','Metaphor','Latin','Light'],'High-Status':['Linguistic','Material','Mythology'],Rebellion:['Contradiction','Edge','Invented'],Momentum:['Nature','Physics','Invented'],Relief:['Place','Sound','Nature'],Control:['Maritime','Architecture','Measure']};
const BANK={Belonging:[{t:'Vesper',lens:'Time · Myth',story:'The evening star — the hour the ritual begins.',s:88,cf:'Carries the ceremony without ever naming the drink.'},{t:'Aperto',lens:'Linguistic · IT',story:'“Open” — and hidden inside aperitivo.',s:85,cf:'A hidden-construction name: insiders feel the wink.'},{t:'Commons',lens:'Place · Metaphor',story:'The shared table everyone belongs at.',s:81,cf:'Belonging stated as a place, not a slogan.'},{t:'Hearth',lens:'Metaphor',story:'The warm center people gather around.',s:78,cf:'Warm, human, instantly drawable.'},{t:'Cohort',lens:'Identity',story:'Your people — the ones you arrive with.',s:73,cf:'Tribe-forward; a little corporate at the edges.'}],
Wonder:[{t:'Halcyon',lens:'Mythology',story:'The mythic bird that calms the seas.',s:84,cf:'Deep myth, soft sound, rare in-category.'},{t:'Lumen',lens:'Latin · Light',story:'A unit of light — the spark of discovery.',s:80,cf:'Clean, scalable, optimistic.'},{t:'Prism',lens:'Metaphor',story:'One input in, a spectrum out.',s:78,cf:'Visual and ownable.'}],
'High-Status':[{t:'Sable',lens:'Material',story:'Deep, rare, quietly expensive.',s:83,cf:'Status by texture, not by shouting.'},{t:'Atelier',lens:'Linguistic · FR',story:'The master’s workshop — craft as status.',s:79,cf:'Premium signal; longer to say.'},{t:'Noctua',lens:'Latin',story:'Of the night; an owl.',s:76,cf:'Distinctive, a little cryptic.'}],
Rebellion:[{t:'Vandal',lens:'Edge',story:'Beautiful defiance.',s:80,cf:'Polarizing — and that’s the point.'},{t:'Static',lens:'Metaphor',story:'Disruption you can feel.',s:75,cf:'Tense, modern, a bit abstract.'},{t:'Riot',lens:'Contradiction',story:'Loud, on purpose.',s:73,cf:'Bold; watch the second-meaning.'}],
Momentum:[{t:'Kestrel',lens:'Nature',story:'Hovers, then strikes — speed with control.',s:84,cf:'Speed that still feels precise.'},{t:'Slipstream',lens:'Physics',story:'Drafting fast behind nothing.',s:80,cf:'Evocative; a little long.'},{t:'Vault',lens:'Metaphor',story:'To leap — clear over.',s:77,cf:'Punchy; shared meaning with security.'}],
Relief:[{t:'Cove',lens:'Place',story:'A protected harbor.',s:82,cf:'Calm, safe, instantly visual.'},{t:'Lull',lens:'Sound',story:'The quiet that arrives.',s:79,cf:'Soft and short; gentle.'},{t:'Eaves',lens:'Architecture',story:'The edge that keeps the rain off.',s:75,cf:'Quietly protective; uncommon.'}],
Control:[{t:'Helm',lens:'Maritime',story:'Steering — command.',s:83,cf:'Authority without aggression.'},{t:'Tare',lens:'Measure',story:'The precise zero before you weigh.',s:78,cf:'Precise; needs a teaching beat.'},{t:'Bastion',lens:'Architecture',story:'A stronghold.',s:80,cf:'Strong, secure, a touch heavy.'}]};
const CRITS=['Imagery','Memorability','Distinct.','Special'];

/* layers in Z */
const LAYER={idea:0, feeling:1100, lenses:2200, names:3300};
const STAGES=[['idea','Idea'],['feeling','Feeling'],['lenses','Lenses'],['names','Names']];
let stage='idea', maxStage=0, feeling=null;
let camZ=-FOCAL, targetCamZ=LAYER.idea-FOCAL;

/* nodes & ambient dots */
let nodes=[], seen=new Set();
let dots=Array.from({length:150},()=>({x:(Math.random()*2-1)*W*0.9,y:(Math.random()*2-1)*H*0.9,z:Math.random()*3800}));

function spread(layerZ,xr,yr){return {x:(Math.random()*2-1)*W*xr, y:(Math.random()*2-1)*H*yr, z:layerZ+(Math.random()*2-1)*260};}
function addWord(w){ if(seen.has(w)||w.length<4||STOP.has(w))return; seen.add(w);
  const p=spread(LAYER.idea,0.5,0.46); nodes.push({text:w,...p,kind:'raw',size:30,col:[244,241,234]});
  if(nodes.filter(n=>n.kind==='raw').length>30){const k=nodes.findIndex(n=>n.kind==='raw');nodes.splice(k,1);} }
function detectFeeling(t){t=' '+t.toLowerCase()+' ';let best='Belonging',bs=0;for(const f in FEELKW){let s=0;FEELKW[f].forEach(k=>{if(t.includes(k))s++;});if(s>bs){bs=s;best=f;}}return best;}

function resolveBrief(text){ feeling=detectFeeling(text); const col=hexRgb(FEELCOL[feeling]);
  nodes.push({text:'FEELING · '+feeling, x:0,y:-H*0.05,z:LAYER.feeling, kind:'label',size:46,col});
  unlock(1); go('feeling');
  document.getElementById('act').textContent='Reveal lenses →'; document.getElementById('act').disabled=false;
  document.getElementById('tip').textContent='feeling: '+feeling; }
function revealLenses(){ const col=hexRgb(FEELCOL[feeling]); (LENSES_FOR[feeling]||[]).forEach((l,k)=>{
  const p=spread(LAYER.lenses,0.5,0.42); nodes.push({text:l.toUpperCase(),...p,kind:'lens',size:34,col}); });
  unlock(2); go('lenses');
  document.getElementById('act').textContent='Name this world →'; }
function bloomNames(){ const col=hexRgb(FEELCOL[feeling]); const list=BANK[feeling]||BANK.Belonging; const N=list.length;
  list.forEach((nm,k)=>{ const a=-Math.PI/2+0.4+(k/N)*Math.PI*2; const rx=W*(isMobile()?0.36:0.34), ry=H*(isMobile()?0.30:0.32);
    nodes.push({text:nm.t, x:Math.cos(a)*rx, y:Math.sin(a)*ry, z:LAYER.names+(Math.random()*2-1)*200, kind:'name',size:74,col,data:nm}); });
  unlock(3); go('names'); document.getElementById('act').textContent='✓ names emerged'; document.getElementById('act').disabled=true;
  document.getElementById('tip').textContent='tap a name to see why it exists'; }

function unlock(n){ maxStage=Math.max(maxStage,n); buildNav(); }
function go(s){ stage=s; targetCamZ=LAYER[s]-FOCAL; buildNav(); }

/* nav */
const navEl=document.getElementById('nav');
function buildNav(){
  navEl.querySelectorAll('.st').forEach(e=>e.remove());
  STAGES.forEach(([k,lb],i)=>{ const d=document.createElement('div'); d.className='st'+(stage===k?' cur':''); d.dataset.lock=i>maxStage?1:0;
    d.innerHTML=`<span class="lb">${lb}</span><span class="dot"></span>`; d.onclick=()=>{ if(i<=maxStage) go(k); }; navEl.appendChild(d); });
}
buildNav();

/* projection + render */
function frame(){
  camZ+=(targetCamZ-camZ)*0.055;
  ctx.fillStyle='#060608';ctx.fillRect(0,0,W,H);
  // ambient depth dots
  for(const p of dots){ let dz=p.z-camZ; if(dz<40){p.z=camZ+3800;dz=p.z-camZ;} const sc=FOCAL/dz;
    const sx=W/2+p.x*sc, sy=H/2+p.y*sc; const a=Math.min(dz/600,1)*(1-Math.min(dz/3800,1))*0.5;
    ctx.fillStyle=`rgba(255,255,255,${a*0.5})`; ctx.beginPath(); ctx.arc(sx,sy,Math.max(sc*2.2,0.4),0,6.28); ctx.fill(); }
  // nodes sorted far->near
  const vis=nodes.map(n=>{const dz=n.z-camZ; return {n,dz};}).filter(o=>o.dz>50).sort((a,b)=>b.dz-a.dz);
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(const{n,dz} of vis){ const sc=FOCAL/dz; const sx=W/2+n.x*sc, sy=H/2+n.y*sc;
    n._sx=sx;n._sy=sy;n._sc=sc;n._dz=dz;
    const fade=Math.min(dz/300,1)*(1-Math.min(Math.max(dz-2600,0)/1400,1)); if(fade<=0.01)continue;
    const[r,g,b]=n.col; const fs=n.size*sc;
    if(n.kind==='name'){ ctx.font=`380 ${fs}px "Fraunces",serif`; ctx.fillStyle=`rgba(${r},${g},${b},${0.55+fade*0.45})`;
      ctx.shadowColor=`rgba(${r},${g},${b},.5)`;ctx.shadowBlur=26*sc;ctx.fillText(n.text,sx,sy);ctx.shadowBlur=0;
      ctx.font=`400 ${Math.max(fs*0.16,8)}px "Space Mono",monospace`;ctx.fillStyle=`rgba(${r},${g},${b},${fade*0.55})`;ctx.fillText(n.data.lens.toUpperCase(),sx,sy+fs*0.62);
      n._w=ctx.measureText(n.text).width;
    } else if(n.kind==='label'){ ctx.font=`700 ${fs}px "Space Mono",monospace`; ctx.fillStyle=`rgba(${r},${g},${b},${fade})`;
      ctx.shadowColor=`rgba(${r},${g},${b},.5)`;ctx.shadowBlur=20*sc;ctx.fillText(n.text,sx,sy);ctx.shadowBlur=0;
    } else if(n.kind==='lens'){ ctx.font=`700 ${fs}px "Space Mono",monospace`; ctx.fillStyle=`rgba(${r},${g},${b},${fade*0.85})`; ctx.fillText(n.text,sx,sy);
    } else { ctx.font=`400 ${fs}px "Inter",sans-serif`; ctx.fillStyle=`rgba(${r},${g},${b},${fade*0.7})`; ctx.fillText(n.text,sx,sy); }
  }
  requestAnimationFrame(frame);
}

/* hit-test names in screen space */
cv.addEventListener('pointerdown',e=>{ if(stage!=='names')return; const px=e.clientX*DPR,py=e.clientY*DPR; let hit=null,best=1e9;
  for(const n of nodes){ if(n.kind!=='name'||!n._sx||n._dz<50)continue; const w=(n._w||n.size*n._sc*3), h=n.size*n._sc*1.3;
    const dx=Math.abs(px-n._sx),dy=Math.abs(py-n._sy); if(dx<w/2+18*DPR&&dy<h/2+14*DPR){const d=dx+dy;if(d<best){best=d;hit=n;}} }
  if(hit)openSheet(hit); });

function openSheet(n){ const d=n.data,col=FEELCOL[feeling]; const tier=d.s>=85?'Exceptional':d.s>=70?'Strong':'Workable';
  const sv=i=>Math.max(2,Math.min(5,Math.round(d.s/20+((d.t.charCodeAt(i%d.t.length)%3)-1))));
  const crits=CRITS.map((c,i)=>`<div class="crit"><span class="nm">${c}</span><span class="tk"><span class="fl" style="width:${sv(i)*20}%;background:${col}"></span></span><span class="v">${sv(i)}</span></div>`).join('');
  const sibs=(BANK[feeling]||[]).filter(x=>x.t!==d.t).map(x=>`<span class="c" data-jump="${x.t}">${x.t}</span>`).join('');
  document.getElementById('sheet').innerHTML=`<button class="x" id="sx">✕</button><span class="lens"><span class="sw" style="background:${col}"></span>${d.lens}</span><h2>${d.t}</h2><div class="story" style="color:${col}">${d.story}</div><div class="scorehead"><div class="n">${d.s}<small>/100</small></div><div class="tier">${tier}</div></div>${crits}<div class="cf"><b>The case for</b>${d.cf}</div><div class="conn"><div class="h">Connected · same world</div><div class="row">${sibs}</div></div>`;
  document.getElementById('sheet').classList.add('on');document.getElementById('scrim').classList.add('on');
  document.getElementById('sx').onclick=closeSheet;
  document.querySelectorAll('#sheet .c').forEach(c=>c.onclick=()=>{const nn=nodes.find(x=>x.kind==='name'&&x.text===c.dataset.jump);if(nn)openSheet(nn);}); }
function closeSheet(){document.getElementById('sheet').classList.remove('on');document.getElementById('scrim').classList.remove('on');}
document.getElementById('scrim').onclick=closeSheet;

/* input */
const inp=document.getElementById('in'),act=document.getElementById('act'),lead=document.getElementById('lead');let deb;
function onType(){ if(inp.value.trim())lead.classList.add('hide'); if(stage==='idea')act.disabled=inp.value.trim().length<14;
  inp.value.toLowerCase().split(/[^a-z']+/).forEach(w=>{w=w.replace(/'/g,'');if(w)addWord(w);});
  clearTimeout(deb);deb=setTimeout(()=>{if(stage==='idea'&&inp.value.trim().length>20)resolveBrief(inp.value);},1500); }
inp.oninput=onType;
act.onclick=()=>{ if(stage==='idea')resolveBrief(inp.value); else if(stage==='feeling')revealLenses(); else if(stage==='lenses')bloomNames(); };
document.getElementById('ex').onclick=()=>{inp.value="a non-alcoholic aperitif for people who quit drinking but miss the ritual of a proper drink in the evening — about still feeling like you belong at the bar, premium and a little ceremonial";onType();inp.focus();};
