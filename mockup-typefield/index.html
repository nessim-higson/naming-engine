<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Type Field — Naming Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0..1,300..500&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--fd:"Fraunces",Georgia,serif;--fu:"Inter",system-ui,sans-serif;--fm:"Space Mono",monospace;
  --ink:#F4F1EA;--soft:#8a867d;--line:#ffffff1c;--ease:cubic-bezier(.22,.61,.36,1)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#080809}
body{font-family:var(--fu);color:var(--ink);-webkit-font-smoothing:antialiased}
canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0}
.vig{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(130% 120% at 50% 46%,transparent 40%,#05050799 80%,#050507 100%)}
.bar{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;justify-content:space-between;padding:24px 30px;pointer-events:none}
.brand{display:flex;align-items:center;gap:11px;font-weight:600;font-size:14px;letter-spacing:.02em;text-shadow:0 1px 20px #000a}
.brand .mk{width:18px;height:18px;border:1.5px solid var(--ink);border-radius:50%;position:relative}
.brand .mk::after{content:"";position:absolute;inset:4px;border-radius:50%;background:var(--ink)}
.brand small{color:var(--soft);font-weight:400}
.tip{font-size:12px;color:var(--soft);text-shadow:0 1px 16px #000;letter-spacing:.01em}

/* centered prompt that fades once you start */
.lead{position:fixed;z-index:3;left:50%;top:30%;transform:translateX(-50%);text-align:center;
  pointer-events:none;transition:opacity .6s,transform .6s}
.lead.hide{opacity:0;transform:translateX(-50%) translateY(-14px)}
.lead h1{font-family:var(--fd);font-weight:340;font-size:clamp(26px,3.6vw,42px);letter-spacing:-.02em}
.lead h1 em{font-style:italic}
.lead p{color:var(--soft);font-size:14px;margin-top:10px}

/* dynamic-island input (nod to Kunumi) */
.island{position:fixed;z-index:5;left:50%;bottom:46px;transform:translateX(-50%);
  width:min(680px,92vw);background:#0c0c0ecc;backdrop-filter:blur(20px) saturate(1.2);
  border:1px solid var(--line);border-radius:999px;padding:7px 8px 7px 22px;display:flex;align-items:center;gap:12px;
  box-shadow:0 24px 70px -30px #000d;transition:border-color .3s}
.island:focus-within{border-color:#ffffff44}
.island .pre{font-family:var(--fm);font-size:12px;color:var(--soft);white-space:nowrap}
#in{flex:1;background:transparent;border:0;outline:0;color:var(--ink);font-family:var(--fu);font-size:15.5px;padding:11px 0}
#in::placeholder{color:#ffffff36}
.read{font-family:var(--fu);font-weight:600;font-size:13px;padding:11px 20px;border-radius:999px;border:0;cursor:pointer;
  background:var(--ink);color:#0a0a0a;white-space:nowrap;transition:.2s var(--ease)}
.read:hover{transform:translateY(-1px)}.read[disabled]{opacity:.32;cursor:not-allowed;transform:none}
.exline{position:fixed;z-index:5;left:50%;bottom:18px;transform:translateX(-50%);font-size:11.5px;color:var(--soft)}
.exline button{background:none;border:0;color:var(--ink);cursor:pointer;text-decoration:underline;text-underline-offset:3px;font-family:var(--fu);font-size:11.5px}
</style>
</head>
<body>
<canvas id="field"></canvas>
<div class="vig"></div>
<div class="bar">
  <div class="brand"><span class="mk"></span> Naming Engine <small>· type field</small></div>
  <div class="tip" id="tip">your words surface · pause to let them resolve</div>
</div>

<div class="lead" id="lead"><h1>Tell me what you're <em>building.</em></h1><p>Just talk. Watch your idea take shape in the field.</p></div>

<div class="island">
  <span class="pre">▸ idea</span>
  <input id="in" placeholder="we're making a drink for people who quit alcohol but miss the ritual…" autocomplete="off" />
  <button class="read" id="read" disabled>Resolve →</button>
</div>
<div class="exline"><button id="ex">try an example</button></div>

<script>
const cv=document.getElementById('field'),ctx=cv.getContext('2d');
let W,H,DPR;
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;}
addEventListener('resize',resize);resize();

const STOP=new Set('the a an of for but who and to in it is we our that with you your are on as be by or so i im were re make making build building this they them at not about into like just'.split(' '));
const FEELKW={
  Relief:['calm','rest','stress','relief','ease','quiet','peace','simple','soothe'],
  Momentum:['fast','speed','scale','grow','accelerate','momentum','ship','launch','move'],
  'High-Status':['premium','luxury','crafted','elegant','refined','ceremonial','proper','sophisticated'],
  Wonder:['magic','wonder','discover','curious','awe','imagine','dream','explore','delight'],
  Rebellion:['rebel','against','disrupt','bold','break','anti','defiant','opposite'],
  Belonging:['belong','community','together','tribe','people','human','connect','ritual','miss','bar','share'],
  Control:['control','secure','precise','master','reliable','trust','data','power']
};
const FEELCOL={Relief:'#A8E0D8',Momentum:'#3DE0FF','High-Status':'#C9A24C',Wonder:'#9B6CF2',Rebellion:'#C6F24E',Belonging:'#E8A24C',Control:'#9FB2C6'};

// nodes: raw words + resolved labels
let nodes=[], seen=new Set(), threads=[];
function addWord(w){
  if(seen.has(w)||w.length<4||STOP.has(w))return;
  seen.add(w);
  const cx=W*0.5, cy=H*0.46;
  const ang=Math.random()*Math.PI*2, rad=(120+Math.random()*Math.min(W,H)*0.34)*DPR;
  nodes.push({text:w, x:cx+Math.cos(ang)*rad*0.4, y:cy+Math.sin(ang)*rad*0.35,
    tx:cx+Math.cos(ang)*rad, ty:cy+Math.sin(ang)*rad*0.78,
    vx:0,vy:0, drift:Math.random()*Math.PI*2, kind:'raw', i:0, size:(13+Math.random()*5)*DPR, col:[244,241,234]});
}
function resolve(text){
  const t=' '+text.toLowerCase()+' ';
  let best='Belonging',bs=0;
  for(const f in FEELKW){let s=0;FEELKW[f].forEach(k=>{if(t.includes(k))s++;});if(s>bs){bs=s;best=f;}}
  // spawn a labelled brief node, threaded to a couple of source words
  const col=hexRgb(FEELCOL[best]);
  const cx=W*0.5,cy=H*0.46;
  const lab={text:'FEELING · '+best, x:cx,y:cy-90*DPR, tx:cx,ty:cy-150*DPR, vx:0,vy:0, drift:0, kind:'label', i:0, size:17*DPR, col};
  nodes.push(lab);
  // thread it to up to 4 raw nodes that matched
  const matched=nodes.filter(n=>n.kind==='raw'&&FEELKW[best].some(k=>n.text.includes(k))).slice(0,4);
  (matched.length?matched:nodes.filter(n=>n.kind==='raw').slice(-4)).forEach(n=>threads.push([lab,n,col]));
  // recolor matched raws toward the feeling
  matched.forEach(n=>n.col=col);
  document.getElementById('tip').textContent='resolved — feeling: '+best+'  ·  (name candidates would bloom next)';
}
function hexRgb(h){const n=parseInt(h.slice(1),16);return[n>>16&255,n>>8&255,n&255];}

function frame(){
  ctx.globalCompositeOperation='source-over';ctx.fillStyle='#080809';ctx.globalAlpha=1;ctx.fillRect(0,0,W,H);
  // threads
  ctx.lineWidth=1*DPR;
  for(const[a,b,c]of threads){
    const al=Math.min(a.i,b.i)*0.5;
    ctx.strokeStyle=`rgba(${c[0]},${c[1]},${c[2]},${al})`;
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
  }
  // faint proximity web among raw nodes
  ctx.lineWidth=0.6*DPR;
  for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
    const a=nodes[i],b=nodes[j];if(a.kind!=='raw'||b.kind!=='raw')continue;
    const dx=a.x-b.x,dy=a.y-b.y,d=Math.hypot(dx,dy);
    if(d<150*DPR){ctx.strokeStyle=`rgba(255,255,255,${(1-d/(150*DPR))*0.05*Math.min(a.i,b.i)})`;
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
  }
  // nodes
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(const n of nodes){
    n.i+=(1-n.i)*0.06;
    n.drift+=0.01;
    const dx=(n.tx-n.x), dy=(n.ty-n.y);
    n.x+=dx*0.012 + Math.cos(n.drift)*0.18*DPR;
    n.y+=dy*0.012 + Math.sin(n.drift*0.9)*0.18*DPR;
    const[r,g,b]=n.col;
    if(n.kind==='label'){
      ctx.font=`600 ${n.size}px var(--fm)`;ctx.font=`700 ${n.size}px "Space Mono",monospace`;
      ctx.fillStyle=`rgba(${r},${g},${b},${n.i})`;
      ctx.shadowColor=`rgba(${r},${g},${b},.5)`;ctx.shadowBlur=18*DPR;
      ctx.fillText(n.text,n.x,n.y);ctx.shadowBlur=0;
    }else{
      ctx.font=`400 ${n.size}px "Inter",sans-serif`;
      ctx.fillStyle=`rgba(${r},${g},${b},${0.18+n.i*0.5})`;
      ctx.fillText(n.text,n.x,n.y);
    }
  }
  requestAnimationFrame(frame);
}

const inp=document.getElementById('in'),readBtn=document.getElementById('read'),lead=document.getElementById('lead');
let debounce;
function onType(){
  if(inp.value.trim())lead.classList.add('hide');
  readBtn.disabled=inp.value.trim().length<14;
  // surface meaningful words
  inp.value.toLowerCase().split(/[^a-z']+/).forEach(w=>{w=w.replace(/'/g,'');if(w)addWord(w);});
  clearTimeout(debounce);
  debounce=setTimeout(()=>{ if(inp.value.trim().length>20 && !nodes.some(n=>n.kind==='label')) resolve(inp.value); },1400);
}
inp.oninput=onType;
readBtn.onclick=()=>{ if(!nodes.some(n=>n.kind==='label')) resolve(inp.value); };
document.getElementById('ex').onclick=()=>{
  inp.value="we're making a non-alcoholic aperitif for people who quit drinking but miss the ritual of a proper drink in the evening — it's about still feeling like you belong at the bar, premium and a little ceremonial";
  onType();inp.focus();
};
frame();
</script>
</body>
</html>
